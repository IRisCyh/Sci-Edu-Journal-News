### 1. Journal of Science Education and Technology

#### 1. Science Teachers' Technology Integration through TPACK-P: Proficiency and Component Interactions

- 作者：Murat Berat Ucar, Elvan Sahin
- 日期：2026-05-23
- DOI：10.1007/s10956-026-10331-7
- 链接：https://doi.org/10.1007/s10956-026-10331-7
- 英文 abstract 要点：研究用 TPACK-Practical 框架考察在职科学教师如何在真实课堂中整合技术，关注 assessment、planning、design、enactment 等维度，并分析 TPACK-P 组成部分之间的关系。案例来自 4 位教授力与能量主题的科学教师，数据包括课堂观察与半结构访谈。
- 易读中文摘要：这篇文章关心科学教师到底怎样把技术用进课堂，而不是只看他们是否“会用工具”。研究发现，不同教师的技术整合水平差异很大，评价活动在技术使用中扮演核心角色，而 ICT 在科学内容讲解中的使用仍不足。文章提示教师培训不能只教工具操作，更要结合具体科学主题、评价方式和课堂情境来支持教师发展。

#### 2. A Study on Student Perceptions and Engagement With a Virtual Instrumentation Twin in an Undergraduate Analytical Chemistry Laboratory

- 作者：Aoife Morrin, Rachel Kavanagh, Brett Stout, Martin Nolan, Blanaid White, Frances Heaney, et al.
- 日期：2026-05-22
- DOI：10.1007/s10956-026-10320-w
- 链接：https://doi.org/10.1007/s10956-026-10320-w
- 英文 abstract 要点：研究考察本科分析化学实验中的 VR 数字孪生仪器 Immersive ChemLab。应用围绕原子吸收光谱仪，作为实体实验前的准备活动。研究收集学生问卷与焦点小组数据，重点分析学生的准备感、信心、理论理解和使用体验。
- 易读中文摘要：文章探讨 VR 数字孪生能不能帮助学生在接触昂贵复杂仪器前做好准备。学生普遍认为 VR 让他们更熟悉仪器操作、提升信心，也更理解 AAS 的理论与流程。不过研究仍是探索性设计，样本较小，没有控制组，也缺少客观成绩指标，因此不能直接证明 VR 一定提升学习效果。对科学实验教学来说，它的价值主要在于为资源有限的实验课提供预演空间。

#### 3. Exploring the Capacity of Large Language Models to Simulate Students' Scientific Thinking: Insights for Responsive Teaching

- 作者：Ha Nguyen, Jie Cao
- 日期：2026-05-21
- DOI：10.1007/s10956-026-10333-5
- 链接：https://doi.org/10.1007/s10956-026-10333-5
- 英文 abstract 要点：Crossref 元数据未提供 abstract。
- 易读中文摘要：从题名看，文章关注大语言模型是否能够模拟学生的科学思维，并讨论这对 responsive teaching 的启示。正式使用时需要进一步打开 DOI 页面核验 abstract 后再展开研究问题、方法和发现。

### 2. Physical Review Physics Education Research

#### 1. How and why physics faculty share their identities with students: Four personas

- 作者：Alia Hamdan, Ash Bista, Dina L. Newman, Scott Franklin
- 日期：2026-05-26
- DOI：10.1103/tg9n-wphd
- 链接：https://doi.org/10.1103/tg9n-wphd
- 英文 abstract 要点：研究通过访谈 19 位物理教师，分析教师在课堂中分享个人身份的方式与原因，并归纳出四种 persona：积极建立信任者、保持界限者、谨慎分享者等。核心问题是教师如何在连接学生与维护职业边界之间做选择。
- 易读中文摘要：这篇文章把物理教师的“身份分享”当作教学关系的一部分来研究。教师可能通过分享个人经历来建立信任，也可能因为过去经历、制度压力或担心学生反应而选择保留。文章对物理教育中的归属感、公平性和师生关系有启发，尤其适合关注 STEM 教师身份与课堂文化的读者。

#### 2. Supporting sensemaking of physics equations: An intervention study in undergraduate courses

- 作者：Julia Hofmann, Pascal Klein, Andreas Muller, Josefine Neuhaus
- 日期：2026-05-22
- DOI：10.1103/mb7q-kf2s
- 链接：https://doi.org/10.1103/mb7q-kf2s
- 英文 abstract 要点：文章关注大学物理中学生如何理解方程的物理意义，而不是只把方程当作计算工具。研究设计干预，帮助学生通过量纲、共变关系等策略解释和评价物理方程。
- 易读中文摘要：这项研究直指物理学习中常见的问题：学生会算，但不一定理解公式意味着什么。作者尝试通过教学干预让学生解释方程、判断其合理性，并把数学表达与物理情境联系起来。它对大学物理教学、建模能力和专家式推理培养都很相关。

#### 3. Beyond named methods: A typology of active learning based on classroom observation networks

- 作者：Meagan Sundstrom, Justin Gambrell, Colin Green, Adrienne L. Traxler, Eric Brewe
- 日期：2026-05-21
- DOI：10.1103/ylsr-968q

- 英文 abstract 要点：研究把 cognitive load theory 与 desirable difficulties 结合起来，采用 2 x 2 因子干预设计，比较任务复杂度恒定较高或逐步提高、任务安排为 interleaved 或 blocked 时的学习效果。样本为 132 名学习者，并在两天后进行后测。结果显示，复杂的 desirable difficulty 任务可以提升表现，而认知负荷会影响学习者是否投入更有价值的元认知过程。

  <script>
    const markdown = document.getElementById("digest-md").textContent.trim();
    const journalOrder = [
      "Journal of Science Education and Technology",
      "Physical Review Physics Education Research",
      "International Journal of Science Education",
      "Science Education",
      "Journal of Research in Science Teaching (JRST)",
      "British Journal of Educational Technology (BJET)",
      "International Journal of STEM Education",
      "Research in Science Education",
      "International Journal of Science and Mathematics Education (IJSME)",
      "Studies in Science Education",
      "Instructional Science"
    ];

    const escapeHtml = (value) => String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    const slug = (value) => String(value || "")
      .toLowerCase()
      .replace(/[^\p{L}\p{N}]+/gu, "-")
      .replace(/^-+|-+$/g, "");

    const linkify = (value) => escapeHtml(value).replace(
      /(https:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>'
    );

    function splitByHeading(source, level) {
      const marker = "#".repeat(level) + " ";
      const lines = source.split(/\r?\n/);
      const chunks = [];
      let current = null;

      for (const line of lines) {
        if (line.startsWith(marker)) {
          if (current) chunks.push(current);
          current = { title: line.slice(marker.length).trim(), body: [] };
        } else if (current) {
          current.body.push(line);
        }
      }

      if (current) chunks.push(current);
      return chunks.map((chunk) => ({ ...chunk, body: chunk.body.join("\n").trim() }));
    }

    function parseBullets(body) {
      return body.split(/\r?\n/)
        .filter((line) => line.trim().startsWith("- "))
        .map((line) => line.trim().slice(2));
    }

    function parseArticle(section) {
      const data = {
        title: section.title.replace(/^\d+\.\s*/, ""),
        authors: "",
        date: "",
        doi: "",
        link: "",
        english: "",
        chinese: ""
      };

      for (const item of parseBullets(section.body)) {
        const index = item.indexOf("：");
        if (index === -1) continue;
        const key = item.slice(0, index).trim();
        const value = item.slice(index + 1).trim();

        if (key === "作者") data.authors = value;
        if (key === "日期") data.date = value;
        if (key === "DOI") data.doi = value;
        if (key === "链接") data.link = value;
        if (key.startsWith("英文")) data.english = value;
        if (key === "易读中文摘要") data.chinese = value;
      }

      return data;
    }

    function parseEntry(section) {
      const subsections = splitByHeading(section.body, 3);
      const record = subsections.find((item) => item.title === "推送记录");
      const highlights = subsections.find((item) => item.title === "今日重点");
      const journals = subsections
        .filter((item) => item.title !== "推送记录" && item.title !== "今日重点")
        .map((journal) => {
          const articleSections = splitByHeading(journal.body, 4);
          const emptyText = articleSections.length ? "" : journal.body.replace(/^-\s*/, "").trim();
          return {
            title: journal.title,
            id: slug(journal.title),
            emptyText,
            articles: articleSections.map(parseArticle)
          };
        });

      return {
        title: section.title,
        id: slug(section.title),
        record: record ? parseBullets(record.body) : [],
        highlights: highlights ? highlights.body.split(/\r?\n/).filter(Boolean) : [],
        journals
      };
    }

    const entries = splitByHeading(markdown, 2).map(parseEntry);

    function renderRecord(items) {
      const html = items.map((item) => `<li>${linkify(item)}</li>`).join("");
      return `<section class="record"><h3>推送记录</h3><ul>${html}</ul></section>`;
    }

    function renderArticle(article) {
      const noAbstract = /未提供 abstract/.test(article.english);
      return `
        <article class="article" data-search="${escapeHtml([article.title, article.authors, article.doi, article.english, article.chinese].join(" ").toLowerCase())}" data-no-abstract="${noAbstract ? "true" : "false"}">
          <h4>${escapeHtml(article.title)}</h4>
          <div class="meta">
            ${article.authors ? `<span class="pill">作者：${escapeHtml(article.authors)}</span>` : ""}
            ${article.date ? `<span class="pill">日期：${escapeHtml(article.date)}</span>` : ""}
            ${article.link || article.doi ? `<span class="pill doi"><a href="${escapeHtml(article.link || `https://doi.org/${article.doi}`)}" target="_blank" rel="noopener">DOI：${escapeHtml(article.doi || article.link)}</a></span>` : ""}
          </div>
          <div class="summary-blocks">
            <section class="summary-block">
              <h5>英文 abstract 要点</h5>
              <p>${escapeHtml(article.english || "未提供。")}</p>
            </section>
            <section class="summary-block">
              <h5>易读中文摘要</h5>
              <p>${escapeHtml(article.chinese || "未提供。")}</p>
            </section>
          </div>
        </article>`;
    }

    function renderJournal(journal) {
      const count = journal.articles.length;
      const body = count
        ? `<div class="article-grid">${journal.articles.map(renderArticle).join("")}</div>`
        : `<div class="empty">${escapeHtml(journal.emptyText || "本时段无新增文章。")}</div>`;

      return `
        <details class="journal" id="${journal.id}" open data-search="${escapeHtml(journal.title.toLowerCase())}">
          <summary>
            <h3 class="journal-title">${escapeHtml(journal.title)}</h3>
            <span class="journal-count">${count ? `${count} 篇` : "无新增"}</span>
          </summary>
          ${body}
        </details>`;
    }

    function renderHighlights(lines) {
      const items = lines.map((line) => {
        const clean = line.replace(/^\d+\.\s*/, "").replace(/\*\*/g, "");
        return `<li>${escapeHtml(clean)}</li>`;
      }).join("");
      return `<section class="highlights"><h3>今日重点</h3><ol>${items}</ol></section>`;
    }

    function render() {
      const content = document.getElementById("content");
      content.innerHTML = entries.map((entry) => `
        <article class="entry" id="${entry.id}">
          ${renderRecord(entry.record)}
          ${entry.journals.map(renderJournal).join("")}
          ${renderHighlights(entry.highlights)}
        </article>
      `).join("");

      document.getElementById("entryNav").innerHTML = entries.map((entry) =>
        `<li><a class="nav-link" href="#${entry.id}">${escapeHtml(entry.title)}</a></li>`
      ).join("");

      const journals = entries[0]?.journals || [];
      document.getElementById("journalNav").innerHTML = journals.map((journal) =>
        `<li><a class="nav-link" href="#${journal.id}">${escapeHtml(journal.title.replace(/^\d+\.\s*/, ""))}</a></li>`
      ).join("");

      const articleCount = document.querySelectorAll(".article").length;
      const noAbstractCount = document.querySelectorAll('[data-no-abstract="true"]').length;
      document.getElementById("statEntries").textContent = entries.length;
      document.getElementById("statJournals").textContent = journals.length;
      document.getElementById("statArticles").textContent = articleCount;
      document.getElementById("statNoAbstract").textContent = noAbstractCount;
      document.getElementById("statusText").textContent = `当前显示 ${articleCount} 篇文章`;
    }

    function applySearch() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      let visibleArticles = 0;

      document.querySelectorAll(".journal").forEach((journal) => {
        let journalHasVisibleArticle = false;
        const journalMatches = journal.dataset.search.includes(query);
        const articles = journal.querySelectorAll(".article");

        if (!articles.length) {
          journal.classList.toggle("hidden", query && !journalMatches);
          return;
        }

        articles.forEach((article) => {
          const visible = !query || journalMatches || article.dataset.search.includes(query);
          article.classList.toggle("hidden", !visible);
          if (visible) {
            visibleArticles += 1;
            journalHasVisibleArticle = true;
          }
        });

        journal.classList.toggle("hidden", query && !journalHasVisibleArticle && !journalMatches);
        if (query && journalHasVisibleArticle) journal.open = true;
      });

      const total = document.querySelectorAll(".article").length;
      document.getElementById("statusText").textContent = query
        ? `搜索结果 ${visibleArticles} / ${total} 篇`
        : `当前显示 ${total} 篇文章`;
    }

    document.getElementById("searchInput").addEventListener("input", applySearch);
    document.getElementById("expandAll").addEventListener("click", () => {
      document.querySelectorAll(".journal").forEach((item) => { item.open = true; });
    });
    document.getElementById("collapseAll").addEventListener("click", () => {
      document.querySelectorAll(".journal").forEach((item) => { item.open = false; });
    });
    document.getElementById("printPage").addEventListener("click", () => window.print());

    render();
  </script>
